openapi: 3.1.2
info:
  description: The basic API contract reused by the full API and SSR example.
  license:
    identifier: Apache-2.0
    name: Apache 2.0
  title: Northstar Operations API
  version: 1.0.0
servers:
  - description: Local development
    url: http://127.0.0.1:3000
paths:
  /api/health:
    get:
      tags:
        - System
      summary: Get API health
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                  requestId:
                    format: uuid
                    type: string
                required:
                  - ok
                type: object
  /api/users:
    get:
      tags:
        - Users
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/User"
                type: array
  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get a user
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            ETag:
              description: Current user version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    patch:
      tags:
        - Users
      summary: Update a user
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: If-Match
          in: header
          description: Quoted user version
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                email:
                  format: email
                  type: string
                name:
                  minLength: 2
                  type: string
                role:
                  enum:
                    - operator
                    - viewer
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "428":
          description: Precondition Required
          content:
            application/problem+json:
              schema:
                additionalProperties: true
                properties:
                  detail:
                    type: string
                  instance:
                    type: string
                  status:
                    maximum: 599
                    minimum: 100
                    type: integer
                  title:
                    type: string
                  type:
                    type: string
                required:
                  - type
                  - title
                  - status
                type: object
components:
  schemas:
    Problem:
      additionalProperties: true
      description: A problem detail response defined by RFC 9457.
      properties:
        detail:
          type: string
        instance:
          format: uri-reference
          type: string
        status:
          maximum: 599
          minimum: 100
          type: integer
        title:
          type: string
        type:
          format: uri-reference
          type: string
      required:
        - type
        - title
        - status
      type: object
    User:
      additionalProperties: false
      properties:
        email:
          format: email
          type: string
        id:
          description: User identifier
          type: string
        name:
          description: Display name
          type: string
        role:
          enum:
            - operator
            - viewer
        version:
          minimum: 1
          type: integer
      required:
        - id
        - name
        - email
        - role
        - version
      type: object
